# This rule is not used by the project costdeck itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the finops.costdeck.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: costdeck
    app.kubernetes.io/managed-by: kustomize
  name: scalingpolicy-editor-role
rules:
- apiGroups:
  - finops.costdeck.io
  resources:
  - scalingpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - finops.costdeck.io
  resources:
  - scalingpolicies/status
  verbs:
  - get
