apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "costdeck-operator.fullname" . }}
  labels:
    {{- include "costdeck-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "costdeck-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "costdeck-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "costdeck-operator.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: COSTDECK_AUTH_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "costdeck-operator.fullname" . }}-admin-credentials
                  key: username
            - name: COSTDECK_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "costdeck-operator.fullname" . }}-admin-credentials
                  key: password
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AWS_PROVIDER_ENABLED
              value: {{ quote .Values.providers.aws.enabled }}
            {{- if .Values.providers.aws.enabled }}
            {{- if and .Values.providers.aws.accessKeyId .Values.providers.aws.secretAccessKey }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "costdeck-operator.fullname" . }}-aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "costdeck-operator.fullname" . }}-aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: {{ include "costdeck-operator.fullname" . }}-aws-credentials
                  key: AWS_REGION
            {{- end }}
            {{- end }}
          ports:
            - name: api-ui
              containerPort: 8082
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
